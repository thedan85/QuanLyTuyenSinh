<section class="page-section">
  <div class="container">
    <div class="page-header">
      <div>
        <span class="eyebrow">Kết quả xét tuyển</span>
        <h1 class="h3 mb-2">Tra cứu kết quả</h1>
        <p class="text-muted">Thông tin được đồng bộ từ hệ thống quản lý.</p>
      </div>
      <div class="header-actions">
        <a class="btn btn-outline-primary btn-sm" href="#/tinh-diem">Tính điểm</a>
      </div>
    </div>

    <div class="row g-4">
      <div class="col-lg-4">
        <div class="card info-card">
          <div class="card-body">
            <div class="card-title">Thí sinh</div>
            <h3 class="h5 mb-3" data-field="fullName">-</h3>
            <ul class="info-list">
              <li><span>CCCD</span><strong data-field="cccd">-</strong></li>
              <li><span>Số báo danh</span><strong data-field="sbd">-</strong></li>
              <li><span>Ngày sinh</span><strong data-field="dob">-</strong></li>
              <li><span>Email</span><strong data-field="email">-</strong></li>
              <li><span>Nơi sinh</span><strong data-field="noiSinh">-</strong></li>
            </ul>
          </div>
        </div>
        <div class="card info-card mt-3">
          <div class="card-body">
            <div class="card-title">Ưu tiên</div>
            <ul class="info-list">
              <li><span>Đối tượng</span><strong data-field="doiTuong">-</strong></li>
              <li><span>Khu vực</span><strong data-field="khuVuc">-</strong></li>
              <li><span>Điểm ưu tiên</span><strong data-field="diemUuTien">-</strong></li>
            </ul>
          </div>
        </div>
      </div>
      <div class="col-lg-8">
        <div data-slot="result-summary"></div>
        <div class="card mt-3">
          <div class="card-body">
            <div class="card-title">Danh sách nguyện vọng</div>
            <div class="table-responsive">
              <table class="table table-sm align-middle result-table">
                <thead>
                  <tr>
                    <th>NV</th>
                    <th>Ngành</th>
                    <th>Tổ hợp</th>
                    <th>Phương thức</th>
                    <th>Điểm</th>
                    <th>Kết quả</th>
                  </tr>
                </thead>
                <tbody id="nvTableBody"></tbody>
              </table>
            </div>
          </div>
        </div>
        <div class="mt-3" data-slot="result-empty"></div>
      </div>
    </div>
  </div>
</section>
