<section class="page page-calculator">
  <div class="container">
    <div class="card calculator-card">
      <h2>Máy tính điểm xét tuyển</h2>
      <div class="tabs" role="tablist">
        <button class="tab-btn is-active" data-target="dgnl">ĐGNL (1200)</button>
        <button class="tab-btn" data-target="vsat">VSAT/THPT</button>
      </div>

      <div id="tab-dgnl" class="tab-panel is-active">
        <form id="form-dgnl" class="form-grid">
          <label for="dgnl-score">Điểm thi (thang 1200)</label>
          <input id="dgnl-score" type="number" min="0" max="1200" />

          <label for="dgnl-major">Chọn ngành</label>
          <select id="dgnl-major"></select>

          <label for="dgnl-region">Khu vực ưu tiên</label>
          <select id="dgnl-region"><option value="0">Không</option><option value="1">KV1</option></select>

          <div class="inline-actions">
            <button id="btn-dgnl-calc" class="btn btn-primary">Tính</button>
            <button id="btn-dgnl-clear" type="button" class="btn btn-ghost">Xóa</button>
          </div>
        </form>
        <div id="dgnl-result" class="result-area"></div>
      </div>

      <div id="tab-vsat" class="tab-panel">
        <form id="form-vsat" class="form-grid">
          <label for="vsat-math">Toán (thang 150)</label>
          <input id="vsat-math" type="number" min="0" max="150" />

          <label for="vsat-phys">Lý</label>
          <input id="vsat-phys" type="number" min="0" max="150" />

          <label for="vsat-chem">Hóa</label>
          <input id="vsat-chem" type="number" min="0" max="150" />

          <label for="vsat-major">Chọn ngành</label>
          <select id="vsat-major"></select>

          <div class="inline-actions">
            <button id="btn-vsat-calc" class="btn btn-primary">Tính</button>
            <button id="btn-vsat-clear" type="button" class="btn btn-ghost">Xóa</button>
          </div>
        </form>
        <div id="vsat-result" class="result-area"></div>
      </div>

    </div>
  </div>
</section>
