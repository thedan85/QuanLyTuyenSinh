<section class="page page-quick-lookup">
  <div class="container">
    <div class="lookup-card card">
      <h2>Tra cứu kết quả xét tuyển</h2>
      <form id="lookup-form" class="form-grid" novalidate>
        <label for="lookup-cccd">CCCD hoặc SBD</label>
        <input id="lookup-cccd" name="keyword" placeholder="Nhập CCCD hoặc số báo danh" />

        <label for="lookup-pass">Mật khẩu (ddmmyyyy)</label>
        <input id="lookup-pass" name="password" placeholder="Ví dụ: 01011998" />

        <div class="inline-actions">
          <button id="btn-lookup" class="btn btn-primary">Tra cứu</button>
          <button id="btn-clear" type="button" class="btn btn-ghost">Xóa</button>
        </div>
      </form>

      <div id="lookup-result" class="result-area"></div>
    </div>
  </div>
</section>
