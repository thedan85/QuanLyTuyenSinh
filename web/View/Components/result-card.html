<div class="card result-card result-{{tone}}">
    <div class="card-body">
        <div class="result-status">{{status}}</div>
        <h3 class="h5 mb-2">{{title}}</h3>
        <p class="text-muted">{{message}}</p>
        <div class="result-grid">
        <div>
            <div class="label">Ngành</div>
            <div class="value">{{major}}</div>
        </div>
        <div>
            <div class="label">Điểm</div>
            <div class="value">{{score}}</div>
        </div>
        <div>
            <div class="label">Tổ hợp</div>
            <div class="value">{{tohop}}</div>
        </div>
        <div>
            <div class="label">Phương thức</div>
            <div class="value">{{method}}</div>
        </div>
        </div>
    </div>
</div>
